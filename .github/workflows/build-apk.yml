name: Build Our Planet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"            >  android/local.properties
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" >> android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download missing gradle-wrapper.jar and recreate wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 7.5 --distribution-type all
          cd ..

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf android/.gradle

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --split-per-abi

      - name: List built APKs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: our-planet-release-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
