name: Build Our Planet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Setup Java 17 (required for Gradle 7.5+)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Setup Flutter (stable version)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      # 4. Create local.properties for Gradle
      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"            >  android/local.properties
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" >> android/local.properties

      # 5. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 6. FIX: Recreate gradle wrapper (solves "Could not find or load main class")
      - name: Recreate gradle wrapper
        run: |
          cd android
          # Remove corrupted jar if exists
          rm -f gradle/wrapper/gradle-wrapper.jar
          # Generate fresh wrapper with Gradle 7.5
          ./gradlew wrapper --gradle-version 7.5 --distribution-type all
          cd ..

      # 7. Clean Gradle caches (prevents cache corruption)
      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf android/.gradle

      # 8. Verify critical files (optional but helpful)
      - name: Verify critical files
        run: |
          echo "=== Flutter version ==="
          flutter --version
          echo "=== gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
          echo "=== google-services.json ==="
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ موجود"
          else
            echo "✗ مفقود — الـ build هيفشل"
            exit 1
          fi

      # 9. Install Flutter dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 10. Build release APK with splits
      - name: Build release APK
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --split-per-abi

      # 11. List generated APKs
      - name: List built APKs
        run: ls -lh build/app/outputs/flutter-apk/

      # 12. Upload APKs as artifacts
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: our-planet-release-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
