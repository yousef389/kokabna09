name: Build Flutter APK (Stable & Fixed)

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  # 1️⃣ Checkout
  - name: Checkout source
    uses: actions/checkout@v4

  # 2️⃣ Setup Java 17
  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  # 3️⃣ Setup Flutter
  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.32.0'
      channel: stable
      cache: true

  # 4️⃣ Fix Environment (🔥 مهم جدًا)
  - name: Fix environment
    run: |
      echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
      echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
      rm -rf ~/.gradle/caches

  # 5️⃣ Accept licenses + install SDK
  - name: Setup Android SDK
    run: |
      yes | sdkmanager --licenses
      sdkmanager "platforms;android-34" "build-tools;34.0.0"

  # 6️⃣ Create local.properties
  - name: Create local.properties
    run: |
      echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

  # 7️⃣ Gradle permission
  - name: Make gradlew executable
    run: chmod +x android/gradlew

  # 8️⃣ Clean project
  - name: Clean project
    run: |
      flutter clean
      rm -rf android/.gradle
      rm -rf build

  # 9️⃣ Install dependencies
  - name: Flutter pub get
    run: flutter pub get

  # 🔟 Build APK
  - name: Build release APK
    run: flutter build apk --release --no-tree-shake-icons --split-per-abi

  # 1️⃣1️⃣ Show output
  - name: List APKs
    run: ls -lh build/app/outputs/flutter-apk/

  # 1️⃣2️⃣ Upload APK
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: flutter-release-apk
      path: build/app/outputs/flutter-apk/app-*-release.apk
      retention-days: 30
