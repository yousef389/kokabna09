name: our_planet_app
description: Our Planet — تطبيق خاص رومانسي لشخصين مبني بـ Flutter + Firebase.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_app_check: ^0.3.1+3
  # State management
  provider: ^6.1.2
  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.4.1
  webview_flutter: ^4.10.0
  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.1
  mime: ^2.0.0
  # Audio / Video
  record: ^6.0.0
  just_audio: ^0.9.40
  video_player: ^2.9.2
  # System
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/stickers/
